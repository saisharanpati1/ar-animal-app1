<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
<script>
let scale = 0.3;

function zoomIn() {
  scale += 0.1;
  document.querySelector("#stag")
    .setAttribute("scale", scale + " " + scale + " " + scale);
}

function zoomOut() {
  scale -= 0.1;
  if(scale < 0.1) scale = 0.1;
  document.querySelector("#stag")
    .setAttribute("scale", scale + " " + scale + " " + scale);
}
</script>

</head>

<body style="margin:0">

<a-scene
xr-mode-ui="enabled: true"
webxr="requiredFeatures: hit-test, local-floor">

<a-assets>
<a-asset-item id="stagModel" src="Stag.glb"></a-asset-item>
</a-assets>

<a-camera 
position="0 1.6 0"
look-controls="touchEnabled: true"
wasd-controls="enabled: true">
</a-camera>

<a-entity
gltf-model="#stagModel"
scale="0.3 0.3 0.3"
position="0 0 -2"
animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
</a-entity>

<a-text
value="STAG\nHerbivore\nHabitat: Forest"
color="yellow"
align="left"
position="1.5 1 -2"
scale="1 1 1">
</a-text>

</a-scene>
<div style="position:absolute; bottom:20px; left:20px;">
<button onclick="zoomIn()">Zoom In</button>
<button onclick="zoomOut()">Zoom Out</button>
</div>

</body>
</html>
