<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

</head>

<body style="margin:0">

<a-scene
xr-mode-ui="enabled: true"
webxr="requiredFeatures: hit-test, local-floor">

<a-assets>
<a-asset-item id="stagModel" src="Stag.glb"></a-asset-item>
</a-assets>

<a-camera position="0 1.6 0"></a-camera>

<a-entity
gltf-model="#stagModel"
scale="0.3 0.3 0.3"
position="0 0 -2">
</a-entity>

  <a-text
value="STAG\nHerbivore\nHabitat: Forest\nLarge antlers"
color="yellow"
align="center"
position="0 2 0"
scale="1 1 1">
</a-text>

</a-scene>

</body>

</html>
